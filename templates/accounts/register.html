{% extends 'accounts/base.html' %}

{% block title %}Register{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card auth-card">
            <div class="card-body p-4 p-md-5">
                <div class="text-center mb-4">
                    <h2 class="h3 fw-bold">Create your account</h2>
                    <p class="text-muted mb-0">
                        Or <a href="{% url 'accounts:login' %}" class="text-decoration-none">sign in to existing account</a>
                    </p>
                </div>
                
                <form method="post" class="mt-4">
                    {% csrf_token %}
                    
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label for="id_first_name" class="form-label">First Name</label>
                            <input type="text" class="form-control" id="id_first_name" name="first_name" required 
                                   placeholder="First Name" autocomplete="given-name">
                        </div>
                        <div class="col-md-6">
                            <label for="id_last_name" class="form-label">Last Name</label>
                            <input type="text" class="form-control" id="id_last_name" name="last_name" required 
                                   placeholder="Last Name" autocomplete="family-name">
                        </div>
                    </div>
                    
                    <div class="mt-3">
                        <label for="id_username" class="form-label">Username</label>
                        <input type="text" class="form-control" id="id_username" name="username" required 
                               placeholder="Username" autocomplete="username">
                    </div>
                    
                    <div class="mt-3">
                        <label for="id_email" class="form-label">Email address</label>
                        <input type="email" class="form-control" id="id_email" name="email" required 
                               placeholder="Email address" autocomplete="email">
                    </div>
                    
                    <div class="mt-3">
                        <label for="id_password1" class="form-label">Password</label>
                        <input type="password" class="form-control" id="id_password1" name="password1" required 
                               placeholder="Password" autocomplete="new-password">
                    </div>
                    
                    <div class="mt-3">
                        <label for="id_password2" class="form-label">Confirm Password</label>
                        <input type="password" class="form-control" id="id_password2" name="password2" required 
                               placeholder="Confirm Password" autocomplete="new-password">
                    </div>
                    
                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-primary btn-lg">Create Account</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

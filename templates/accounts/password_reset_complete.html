{% extends 'accounts/base.html' %}

{% block title %}Password Reset Complete{% endblock %}

{% block content %}
<div class="max-w-md w-full">
    <div class="bg-white rounded-lg shadow-lg p-8 text-center">
        <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4">
            <svg class="w-8 h-8 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
            </svg>
        </div>
        
        <h1 class="text-2xl font-bold text-gray-900 mb-2">Password Reset Complete</h1>
        <p class="text-gray-600 mb-6">Your password has been set. You may go ahead and log in now.</p>
        
        <a href="{% url 'accounts:login' %}" class="inline-block px-6 py-2 bg-primary text-white rounded-lg hover:bg-red-700 transition-colors">
            Log In
        </a>
    </div>
</div>
{% endblock %}

{% extends 'accounts/base.html' %}

{% block title %}Reset Password{% endblock %}

{% block content %}
<div class="max-w-md w-full">
    <div class="bg-white rounded-lg shadow-lg p-8">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-gray-900">Forgot your password?</h1>
            <p class="mt-2 text-sm text-gray-600">Enter your email address below, and we'll email instructions for setting a new one.</p>
        </div>
        
        <form method="post" class="space-y-6">
            {% csrf_token %}
            
            <div>
                <label for="id_email" class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
                <input type="email" name="email" id="id_email" required autofocus
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary"
                       placeholder="you@example.com">
            </div>
            
            <button type="submit" class="w-full px-4 py-2 bg-primary text-white rounded-lg hover:bg-red-700 transition-colors font-medium">
                Send Reset Link
            </button>
        </form>
        
        <div class="mt-6 text-center">
            <a href="{% url 'accounts:login' %}" class="text-sm text-primary hover:text-red-700">
                ← Back to login
            </a>
        </div>
    </div>
</div>
{% endblock %}

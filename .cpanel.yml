---
# Simple Deployment Configuration
# Copy files recursively to deployment directory

deployment:
  user: "%ENV{USER}%"

  hooks:
    pre_deploy:
      - name: "Copy files to destination"
        command: |
          rsync -av --progress \
            --exclude '__pycache__/' \
            --exclude '*.pyc' \
            --exclude '*.pyo' \
            --exclude '.git/' \
            --exclude '.gitignore' \
            --exclude 'node_modules/' \
            --exclude '*.log' \
            --exclude '.env.local' \
            --exclude 'db.sqlite3' \
            --exclude 'staticfiles/' \
            --exclude 'tmp/' \
            . /home/negeobag/himawat/
        user: "%ENV{USER}%"


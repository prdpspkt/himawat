---
# Simple copy deployment for cPanel

deployment:
  pre_build:
    - cp -R accounts /home/negeobag/himawat/
    - cp -R dashboard /home/negeobag/himawat/
    - cp -R himwat /home/negeobag/himawat/
    - cp -R pages /home/negeobag/himawat/
    - cp -R services /home/negeobag/himawat/
    - cp -R static /home/negeobag/himawat/
    - cp -R templates /home/negeobag/himawat/
    - cp -R media /home/negeobag/himawat/
    - cp manage.py /home/negeobag/himawat/
    - cp requirements.txt /home/negeobag/himawat/
    - cp .env.example /home/negeobag/himawat/.env
    - cp passenger_wsgi.py /home/negeobag/himawat/

